name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  # Tag pushes don't trigger ci.yml (its push trigger filters by branch), so
  # run the full CI suite here as a gate: nothing gets published unless every
  # test and type check passes on the tagged commit.
  test:
    name: Run CI
    uses: ./.github/workflows/ci.yml

  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: pypi
      url: https://pypi.org/project/pyobjtojson/
    permissions:
      id-token: write   # required for PyPI trusted publishing (OIDC)
      contents: read    # required for actions/checkout
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
